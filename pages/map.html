<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAWCATOR | Map</title>
  <link rel="stylesheet" href="../assets/css/shared.css" />
  <link rel="stylesheet" href="../assets/css/map.css" />

  <script src="../assets/js/map-state.js"></script>
  <script src="../assets/js/map-utils.js"></script>
  <script src="../assets/js/map-view.js"></script>
  <script src="../assets/js/map-route.js"></script>
  <script src="../assets/js/map-markers.js"></script>
  <script src="../assets/js/map.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAWzVaKWj94jiKiaoHNgRB7vpJhAL0jT9w&callback=initMap&loading=async"
    async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.3.0"></script>
  <script src="../assets/js/typeahead.js"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=finger_alt" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <!--bebas neue font-->
  <script src="../assets/js/theme-toggle.js"></script>
</head>

<body class="map-page">
  <div class="map-video-layer" aria-hidden="true">
    <video class="map-background-video" autoplay muted loop playsinline preload="auto">
      <!-- Mobile video (triggers on screens 768px wide or smaller) -->
      <source src="../assets/videos/verticalBgVid.mp4" type="video/mp4" media="(max-width: 768px)" />

      <!-- Desktop video (fallback for larger screens) -->
      <source src="../assets/videos/test.mp4" type="video/mp4" />
    </video>
    <div class="map-video-overlay"></div>
  </div>

  <header class="navbar">
    <a href="index.html">
      <img class="navbar-logo" src="../assets/images/lawcator-logo-white.png" alt="" />
    </a>
    <nav id="primary-navigation">
      <a href="index.html">Home</a>
      <a href="find.html">Find Lawyer</a>
      <a class="active" href="map.html">Map</a>
      <a href="about.html">About</a>
    </nav>
      <div class="navbar-right">
        <button class="theme-toggle-btn" id="themeToggle" type="button" aria-label="Toggle dark/light mode" data-tooltip="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="navbar-toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false"
      aria-controls="primary-navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
      </div>
  </header>

  <section class="map-controls" aria-label="Map search and filters">
    <div class="flex-search">
      <form id="typeSearchForm" class="search-form" role="search">
        <div class="search-bar">
          <input class="search-input" id="typeSearch" type="text" autocomplete="off" aria-label="Search legal category"
            aria-controls="typeSuggestions" aria-expanded="false" />
          <button class="search-btn" type="submit" aria-label="Search" data-tooltip="Search categories">
            <span class="material-symbols-outlined"> search </span>
          </button>
        </div>
      </form>

      <button id="mobileFilterToggle" type="button" class="mobile-filter-toggle" aria-controls="mapFiltersPanel"
        aria-expanded="false" data-tooltip="Open filters">
        <span class="material-symbols-outlined" aria-hidden="true">filter_alt</span>
        <span>Filters</span>
      </button>

      <ul id="typeSuggestions" class="suggestions" role="listbox"></ul>
    </div>

    <div id="mapFiltersPanel" class="map-filters" aria-label="Map filters">
      <div class="filters-left">
        <label class="filter-field">
          <span>Show</span>
          <select id="scopeFilter">
            <option value="nearest">Nearest</option>
            <option value="all">All firms</option>
          </select>
        </label>

        <label class="filter-field">
          <span>State</span>
          <select id="stateFilter">
            <option value="">All states</option>
          </select>
        </label>

        <label class="filter-field">
          <span>City</span>
          <select id="cityFilter">
            <option value="">All cities</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Budget</span>
          <select id="budgetFilter">
            <option value="">All budgets</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Availability</span>
          <select id="availabilityFilter">
            <option value="">All</option>
            <option value="true">Available now</option>
            <option value="false">Not available</option>
          </select>
        </label>
      </div>

      <div class="filters-right">
        <button id="clearFilters" type="button" class="clear-filter-btn">
          Clear
        </button>
      </div>
    </div>

    <div id="mapNotice" class="map-notice" role="status" aria-live="polite"></div>
  </section>

  <main class="container map-container">
    <h2>Map View</h2>
    <div id="map" class="map-box"></div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__meta">LAWCATOR Demo Project</p>
      <p class="site-footer__disclaimer">
        Disclaimer: The lawyer profiles, firms, service details, fees,
        availability, and contact information shown on this website are dummy
        data for educational purposes only and do not represent real legal
        services.
      </p>
    </div>
  </footer>

  <script src="../assets/js/navbar-toggle.js"></script>
  <script src="../assets/js/tooltip.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="../assets/js/map-search.js"></script>
</body>

</html>
